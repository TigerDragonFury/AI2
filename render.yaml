services:
  # ── API (Web Service) ──────────────────────────────────────────────────────
  - type: web
    name: adavatar-api
    runtime: node
    plan: free
    rootDir: apps/api
    buildCommand: pnpm install --frozen-lockfile --ignore-scripts && pnpm exec prisma generate && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: API_JWT_SECRET
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: TIKTOK_CLIENT_ID
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: SNAPCHAT_CLIENT_ID
        sync: false
      - key: SNAPCHAT_CLIENT_SECRET
        sync: false
      - key: WEB_BASE_URL
        sync: false
      - key: API_BASE_URL
        sync: false

  # ── Worker (Web Service on free plan — background worker type not available) ─
  - type: web
    name: adavatar-worker
    runtime: node
    plan: free
    rootDir: apps/worker
    buildCommand: pnpm install --frozen-lockfile --ignore-scripts && pnpm exec prisma generate && pnpm build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: HUGGINGFACE_API_TOKEN
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: WEB_BASE_URL
        sync: false
      - key: TIKTOK_CLIENT_ID
        sync: false
      - key: TIKTOK_CLIENT_SECRET
        sync: false
      - key: YOUTUBE_CLIENT_ID
        sync: false
      - key: YOUTUBE_CLIENT_SECRET
        sync: false
      - key: META_APP_ID
        sync: false
      - key: META_APP_SECRET
        sync: false
      - key: SNAPCHAT_CLIENT_ID
        sync: false
      - key: SNAPCHAT_CLIENT_SECRET
        sync: false
